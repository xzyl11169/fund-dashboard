services:
  fund-dashboard:
    build: .
    container_name: fund-dashboard
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      FUND_APP_PIN: "${FUND_APP_PIN:-}"
      FUND_APP_TOKEN: "${FUND_APP_TOKEN:-}"
      FUND_APP_SECRET: "${FUND_APP_SECRET:-}"
      FUND_ADMIN_USERNAME: "${FUND_ADMIN_USERNAME:-admin}"
      FUND_ADMIN_PASSWORD: "${FUND_ADMIN_PASSWORD:-}"
      FUND_DB_PATH: "/data/fund_tracker.sqlite3"
      FUND_APP_HOST: "0.0.0.0"
      FUND_APP_PORT: "8765"
    volumes:
      - ./data:/data
