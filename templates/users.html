<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="theme-color" content="#f5f7fb"><title>账户管理 - 基金盈亏</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head>
<body><main class="shell account-shell"><header class="app-header"><div><a class="back-link" href="{{ url_for('index') }}">← 返回持仓</a><h1>账户管理</h1><p>为家人或朋友创建独立账户，持仓数据互不相通。</p></div><div class="account-actions"><span class="account-name">{{ current_user.display_name }}</span><form action="{{ url_for('logout') }}" method="post"><input type="hidden" name="_csrf_token" value="{{ csrf_token() }}"><button class="ghost-button" type="submit">退出</button></form></div></header>
<section class="panel account-panel"><div class="panel-title"><h2>新建账户</h2></div>{% if error %}<div class="form-error">{{ error }}</div>{% endif %}<form method="post" class="user-create-form"><input type="hidden" name="_csrf_token" value="{{ csrf_token() }}"><label>用户名<input name="username" pattern="[A-Za-z0-9_.-]{3,32}" required placeholder="例如 family01"></label><label>显示名称<input name="display_name" maxlength="40" placeholder="例如 家人"></label><label>初始密码<input name="password" type="password" minlength="8" required></label><button class="primary" type="submit">创建账户</button></form></section>
<section class="panel account-panel"><div class="panel-title"><h2>已有账户</h2></div><div class="users-table-wrap"><table class="users-table"><thead><tr><th>账户</th><th>名称</th><th>状态</th><th>操作</th></tr></thead><tbody>{% for user in users %}<tr><td>{{ user.username }}</td><td>{{ user.display_name }}</td><td>{{ '正常' if user.enabled else '已停用' }}</td><td class="user-actions">{% if user.id != current_user.id %}<form action="{{ url_for('toggle_user', user_id=user.id) }}" method="post"><input type="hidden" name="_csrf_token" value="{{ csrf_token() }}"><button class="ghost-button" type="submit">{{ '停用' if user.enabled else '启用' }}</button></form>{% endif %}<form action="{{ url_for('reset_user_password', user_id=user.id) }}" method="post"><input type="hidden" name="_csrf_token" value="{{ csrf_token() }}"><input name="password" type="password" minlength="8" required placeholder="新密码"><button class="ghost-button" type="submit">重置密码</button></form></td></tr>{% endfor %}</tbody></table></div></section></main></body></html>
